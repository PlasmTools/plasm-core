version: 6
http_backend: https://api.cloudflare.com/client/v4
entities:
  Zone:
    id_field: id
    description: 'A Cloudflare zone (site) the account can manage. Agent playbook — treat **`rulesets`** as the default security/WAF hub: traverse **`Zone → rulesets`** for Ruleset Engine inventory. Prefer **`ruleset_get`** with ids from that list before phase shortcuts. Legacy **`waf_package_query`** is **not** on the default zone graph (seed **`WafPackage`** explicitly when auditing the old packages API).'
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: true
        value_ref: nv_wire_str_short
      status:
        required: false
        value_ref: nv_wire_str_short
      paused:
        required: false
        value_ref: nv_zone_paused
      type:
        required: false
        value_ref: nv_wire_str_short
    relations:
      rulesets:
        target: Ruleset
        cardinality: many
        discovery:
          qualifier_terms:
          - rulesets
          - ruleset engine
          - waf
          - firewall
          - managed rules
          - cloudflare waf
          - phase rulesets
          traversal_weight: 1.2
        materialize:
          kind: query_scoped_bindings
          capability: ruleset_query
          bindings:
            zone_id: id
  Ruleset:
    id_field: id
    key_vars:
    - zone_id
    - ruleset_id
    description: 'Rules that control traffic handling for a Cloudflare zone (**Ruleset Engine**). **`ruleset_query`** returns a **mixed** inventory (**managed**, **zone**, **root**, etc.). Rows with **`kind: zone`** are the phase entrypoint rulesets attached to the zone. For inspection, prefer **`ruleset_get`** using **`ruleset_id`** from the list—do **not** assume a **`RulesetEntrypoint`** row exists just because managed rulesets appear in the list.'
    fields:
      zone_id:
        required: true
        value_ref: nv_cloudflare_zone_id
      ruleset_id:
        required: true
        path: id
        value_ref: nv_wire_str_short
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: false
        value_ref: nv_wire_str_short
      description:
        required: false
        value_ref: nv_wire_str_markdown
      kind:
        required: false
        value_ref: nv_wire_sel_8da7df51398b3ce3
      phase:
        required: false
        value_ref: nv_wire_sel_b53dd05524ff4281
      version:
        required: false
        value_ref: nv_wire_str_short
      last_updated:
        required: false
        value_ref: nv_wire_date_rfc3339
  RulesetEntrypoint:
    id_field: id
    key_vars:
    - zone_id
    - ruleset_phase
    description: 'Managed entrypoint ruleset for one execution phase on a zone (**Ruleset Engine** — DDoS L7, managed WAF, rate limits, etc.). Use **`ruleset_entrypoint_get`** when you already know the **`ruleset_phase`** string. **HTTP 404** or Cloudflare error **10003** is **normal** when that phase has **no provisioned entrypoint** yet—absence does **not** mean the zone has no WAF; reconcile against **`ruleset_query`** / **`ruleset_get`** first.'
    fields:
      zone_id:
        required: true
        value_ref: nv_cloudflare_zone_id
      ruleset_phase:
        required: true
        value_ref: nv_wire_sel_zone_ruleset_entrypoint_phase
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: false
        value_ref: nv_wire_str_short
      description:
        required: false
        value_ref: nv_wire_str_markdown
      kind:
        required: false
        value_ref: nv_wire_sel_8da7df51398b3ce3
      phase:
        required: false
        value_ref: nv_wire_sel_zone_ruleset_entrypoint_phase
      version:
        required: false
        value_ref: nv_wire_str_short
      last_updated:
        required: false
        value_ref: nv_wire_date_rfc3339
  WafPackage:
    abstract: true
    id_field: id
    key_vars:
    - zone_id
    description: '**Legacy** WAF package rows from **`GET /zones/{zone_id}/firewall/waf/packages`** only (pre–Ruleset Engine managed-rules packaging). Modern managed WAF is **`ruleset_query`** / **`ruleset_get`**. Empty lists on newer zones are **expected**. **Abstract** in CGS — **no** default **`Zone`** relation; call **`waf_package_query`** only when **`WafPackage`** is explicitly seeded or for migration/audit.'
    fields:
      zone_id:
        required: true
        value_ref: nv_cloudflare_zone_id
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: false
        value_ref: nv_wire_str_short
      description:
        required: false
        value_ref: nv_wire_str_markdown
      detection_mode:
        required: false
        value_ref: nv_wire_str_short
  SecurityOverview:
    abstract: true
    id_field: zone_id
    key_vars:
    - zone_id
    description: 'Composed zone security read model (**rulesets** + legacy **WAF packages**). **Abstract** — seed **`SecurityOverview`** explicitly; runs via **`security_overview_query`** (`transport: view`), not a single Cloudflare endpoint.'
    fields:
      zone_id:
        required: true
        value_ref: nv_cloudflare_zone_id
      zone_name:
        required: false
        value_ref: nv_wire_str_short
      ruleset_count:
        required: false
        value_ref: nv_wire_int
      legacy_waf_package_count:
        required: false
        value_ref: nv_wire_int
      ruleset_kind_counts_json:
        required: false
        value_ref: nv_cf_security_overview_ruleset_hist_json
capabilities:
  zone_query:
    kind: query
    entity: Zone
    description: List zones visible to the token, optionally filtered by account or name.
    parameters:
    - name: account_id
      value_ref: nv_zone_query_account_id
      required: false
      role: filter
    - name: name
      value_ref: nv_zone_query_name
      required: false
      role: filter
    - name: status
      value_ref: nv_zone_query_status
      required: false
      role: filter
    - name: type
      value_ref: nv_zone_query_type
      required: false
      role: filter
    - name: page
      value_ref: nv_zone_query_page
      required: false
      role: response_control
    - name: per_page
      value_ref: nv_zone_query_per_page
      required: false
      role: response_control
  zone_get:
    kind: get
    entity: Zone
    description: Fetch one zone by id.
    provides:
    - id
    - name
    - status
    - paused
    - type
  ruleset_query:
    kind: query
    entity: Ruleset
    description: List Ruleset Engine rulesets for one zone (mixed **managed** / **zone** / **root** inventory — primary hub after **`Zone`**).
    discovery:
      operation_terms:
      - list
      - enumerate
      - inventory
      target_terms:
      - rulesets
      - zone rulesets
      - ruleset engine
      - firewall rulesets
    parameters:
    - name: zone_id
      value_ref: nv_cloudflare_zone_id
      required: true
      role: scope
    - name: per_page
      value_ref: nv_ruleset_query_per_page
      required: false
      role: response_control
  ruleset_get:
    kind: get
    entity: Ruleset
    description: Fetch one ruleset by **`ruleset_id`** for a zone — **preferred** detail path; use ids from **`ruleset_query`** before relying on phase entrypoint shortcuts.
    discovery:
      operation_terms:
      - get
      - fetch
      - load
      - inspect
      target_terms:
      - ruleset by id
      - ruleset detail
      - single ruleset
    parameters:
    - name: zone_id
      value_ref: nv_cloudflare_zone_id
      required: true
      role: scope
    - name: ruleset_id
      value_ref: nv_wire_str_short
      required: true
      role: scope
    provides:
    - zone_id
    - id
    - name
    - description
    - kind
    - phase
    - version
    - last_updated
  ruleset_entrypoint_get:
    kind: get
    entity: RulesetEntrypoint
    description: Get the managed **phase entrypoint** ruleset when you already know **`ruleset_phase`**. **404 / 10003** when the phase entrypoint is **not provisioned** is normal — not equivalent to “ruleset list empty”.
    discovery:
      operation_terms:
      - entrypoint
      - phase entrypoint
      - get by phase
      target_terms:
      - managed phase ruleset
      - phase ruleset
      - rulesets phases entrypoint
    parameters:
    - name: zone_id
      value_ref: nv_cloudflare_zone_id
      required: true
      role: scope
    - name: ruleset_phase
      value_ref: nv_wire_sel_zone_ruleset_entrypoint_phase
      required: true
      role: scope
    provides:
    - zone_id
    - ruleset_phase
    - id
    - name
    - description
    - kind
    - phase
    - version
    - last_updated
  ruleset_entrypoint_update:
    kind: action
    entity: RulesetEntrypoint
    description: Replace the managed entrypoint ruleset for one execution phase on a zone (**Ruleset Engine** write — requires **Zone WAF Edit**).
    parameters:
    - name: zone_id
      value_ref: nv_cloudflare_zone_id
      required: true
      role: scope
    - name: ruleset_phase
      value_ref: nv_wire_sel_zone_ruleset_entrypoint_phase
      required: true
      role: scope
    - name: input
      value_ref: nv_ruleset_entrypoint_update_input
      required: true
    output:
      type: side_effect
      description: The phase entrypoint ruleset is replaced with the submitted ruleset.
  waf_package_query:
    kind: query
    entity: WafPackage
    description: List **legacy** firewall WAF **packages** for a zone (old **`…/firewall/waf/packages`** API — **not** Ruleset Engine). Usually empty on modern zones; use only when **`WafPackage`** is explicitly in context.
    discovery:
      operation_terms:
      - list legacy packages
      - legacy waf packages
      - firewall packages api
      target_terms:
      - waf packages endpoint
      - old managed rules packages
      - pre ruleset engine waf
    parameters:
    - name: zone_id
      value_ref: nv_cloudflare_zone_id
      required: true
      role: scope
    - name: page
      value_ref: nv_wire_int
      required: false
      role: response_control
    - name: per_page
      value_ref: nv_wire_int
      required: false
      role: response_control
  security_overview_query:
    kind: query
    entity: SecurityOverview
    description: Composed read — zone row, Ruleset Engine inventory counts, **`kind`** histogram, and legacy **`waf_package_query`** totals (**explicit `SecurityOverview` seed only**).
    discovery:
      operation_terms:
      - security overview
      - firewall summary
      - waf summary
      target_terms:
      - zone security overview
      - composed rulesets summary
    parameters:
    - name: zone_id
      value_ref: nv_cloudflare_zone_id
      required: true
      role: scope
views:
  security_overview:
    description: Aggregate zone_get + ruleset_query + legacy waf_package_query into one synthetic row.
    capability: security_overview_query
    entity: SecurityOverview
    scope:
    - name: zone_id
      value_ref: nv_cloudflare_zone_id
    nodes:
    - id: zone_row
      capability: zone_get
      bind:
        zone_id:
          kind: scope
          param: zone_id
    - id: rulesets
      capability: ruleset_query
      bind:
        zone_id:
          kind: scope
          param: zone_id
    - id: legacy_packages
      capability: waf_package_query
      bind:
        zone_id:
          kind: scope
          param: zone_id
    output:
      zone_id:
        kind: scope
        param: zone_id
      zone_name:
        kind: node_field
        node: zone_row
        field: name
      ruleset_count:
        kind: node_row_count
        node: rulesets
      legacy_waf_package_count:
        kind: node_row_count
        node: legacy_packages
      ruleset_kind_counts_json:
        kind: node_field_histogram_json
        node: rulesets
        field: kind
oauth:
  provider: cloudflare
  scopes:
    cloudflare.zone.read:
      label: Zone Read
      notes: Lists and reads zones and zone metadata (matches API token permission **Zone Read**; scope family `com.cloudflare.api.account.zone`).
      docs_url: https://developers.cloudflare.com/fundamentals/api/reference/permissions/
    cloudflare.zone.edit:
      label: Zone Edit
      notes: Zone lifecycle and configuration writes beyond read-only (API token **Zone Edit**).
      docs_url: https://developers.cloudflare.com/fundamentals/api/reference/permissions/
    cloudflare.zone.waf.read:
      label: Zone WAF Read
      notes: Read zone WAF surfaces — rulesets, packages, managed phases (API token **Zone WAF Read**).
      docs_url: https://developers.cloudflare.com/fundamentals/api/reference/permissions/
    cloudflare.zone.waf.edit:
      label: Zone WAF Edit
      notes: Change zone WAF rulesets including phase entrypoints (API token **Zone WAF Edit**).
      docs_url: https://developers.cloudflare.com/fundamentals/api/reference/permissions/
  default_scope_sets:
    plasm_cloudflare_demo_readonly:
      description: Demo read bundle — zones plus zone WAF read (list zones, **`Zone → rulesets`** hub; legacy **`waf_package_query`** needs explicit **`WafPackage`** seed; no entrypoint writes).
      scopes:
      - cloudflare.zone.read
      - cloudflare.zone.waf.read
    plasm_cloudflare_demo_operator:
      description: Demo operator bundle — adds Zone WAF Edit so `ruleset_entrypoint_update` can replace managed phase entrypoints (Phase 1 catalog).
      scopes:
      - cloudflare.zone.read
      - cloudflare.zone.waf.read
      - cloudflare.zone.waf.edit
  requirements:
    capabilities:
      zone_query:
        any_of:
        - cloudflare.zone.read
      zone_get:
        any_of:
        - cloudflare.zone.read
      ruleset_query:
        all_of:
        - any_of:
          - cloudflare.zone.read
        - any_of:
          - cloudflare.zone.waf.read
      ruleset_get:
        all_of:
        - any_of:
          - cloudflare.zone.read
        - any_of:
          - cloudflare.zone.waf.read
      ruleset_entrypoint_get:
        all_of:
        - any_of:
          - cloudflare.zone.read
        - any_of:
          - cloudflare.zone.waf.read
      waf_package_query:
        all_of:
        - any_of:
          - cloudflare.zone.read
        - any_of:
          - cloudflare.zone.waf.read
      security_overview_query:
        all_of:
        - any_of:
          - cloudflare.zone.read
        - any_of:
          - cloudflare.zone.waf.read
      ruleset_entrypoint_update:
        all_of:
        - any_of:
          - cloudflare.zone.read
        - any_of:
          - cloudflare.zone.waf.edit
# Bearer API tokens (`CLOUDFLARE_API_TOKEN`) plus optional outbound OAuth (`oauth:`) — tool-model `connect_profile` is mixed auth.
auth:
  scheme: bearer_token
  env: CLOUDFLARE_API_TOKEN
values:
  nv_cf_security_overview_ruleset_hist_json:
    type: json
    description: Ruleset `kind` value histogram for SecurityOverview rows.
  nv_ruleset_entrypoint_update_input:
    type: json
    description: Full ruleset payload for the phase entrypoint update.
  nv_ruleset_query_per_page:
    type: integer
    description: Preferred maximum rows per page when listing rulesets.
  nv_cloudflare_zone_id:
    type: entity_ref
    target: Zone
    description: Zone identifier.
  nv_wire_date_rfc3339:
    type: date
    value_format: rfc3339
  nv_wire_int:
    type: integer
  nv_wire_sel_8da7df51398b3ce3:
    type: select
    allowed_values:
    - custom
    - managed
    - root
    - zone
  nv_wire_sel_zone_ruleset_entrypoint_phase:
    type: select
    description: Phases accepted by zone entrypoint ruleset GET/PUT (excludes account-scoped L4 DDoS).
    allowed_values:
    - ddos_l7
    - http_config_settings
    - http_custom_errors
    - http_log_custom_fields
    - http_ratelimit
    - http_request_cache_settings
    - http_request_dynamic_redirect
    - http_request_firewall_custom
    - http_request_firewall_managed
    - http_request_late_transform
    - http_request_origin
    - http_request_redirect
    - http_request_sanitize
    - http_request_sbfm
    - http_request_transform
    - http_response_cache_settings
    - http_response_compression
    - http_response_firewall_managed
    - http_response_headers_transform
    - magic_transit
    - magic_transit_ids_managed
    - magic_transit_managed
    - magic_transit_ratelimit
  nv_wire_sel_b53dd05524ff4281:
    type: select
    allowed_values:
    - ddos_l4
    - ddos_l7
    - http_config_settings
    - http_custom_errors
    - http_log_custom_fields
    - http_ratelimit
    - http_request_cache_settings
    - http_request_dynamic_redirect
    - http_request_firewall_custom
    - http_request_firewall_managed
    - http_request_late_transform
    - http_request_origin
    - http_request_redirect
    - http_request_sanitize
    - http_request_sbfm
    - http_request_transform
    - http_response_cache_settings
    - http_response_compression
    - http_response_firewall_managed
    - http_response_headers_transform
    - magic_transit
    - magic_transit_ids_managed
    - magic_transit_managed
    - magic_transit_ratelimit
  nv_wire_str_markdown:
    type: string
    string_semantics: markdown
  nv_wire_str_short:
    type: string
    string_semantics: short
  nv_zone_paused:
    type: boolean
  nv_zone_query_account_id:
    type: string
    string_semantics: short
    description: Restrict listed zones to this account.
  nv_zone_query_name:
    type: string
    string_semantics: short
    description: Exact zone name match.
  nv_zone_query_page:
    type: integer
    description: Page index when listing zones.
  nv_zone_query_per_page:
    type: integer
    description: Preferred maximum zones per page when listing.
  nv_zone_query_status:
    type: string
    string_semantics: short
    description: Zone status filter (e.g. active, pending, initializing).
  nv_zone_query_type:
    type: string
    string_semantics: short
    description: Zone type filter (full, partial, etc.).
